name: Build ZMK Firmware

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: |
            modules
            tools
            zephyr
            bootloader
            zmk
          key: ${{ runner.os }}-build-${{ hashFiles('**/west.yml') }}

      - name: Initialize workspace (west init)
        run: west init -l config

      - name: Update modules (west update)
        run: west update

      - name: Export Zephyr
        run: west zephyr-export

      - name: Build firmware
        # Używamy -b nice_nano i wskazujemy tarczę novo_01
        run: west build -s zmk/app -b nice_nano -- -DSHIELD=novo_01 -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Rename and Archive
        run: |
          cp build/zephyr/zmk.uf2 novo_01_firmware.uf2
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: novo_01_firmware.uf2
